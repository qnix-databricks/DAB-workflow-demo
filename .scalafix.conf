# Scalafix configuration (alternative/additional to Scalastyle)
# To use: add sbt-scalafix plugin and run: sbt scalafix

rules = [
  DisableSyntax
  RemoveUnused
]

DisableSyntax {
  noWildcardImports = true
  regex = [
    {
      id = wildcardImports
      pattern = "import .*\\._"
      message = "Wildcard imports are not allowed. Use explicit imports instead. Exception: spark.implicits._"
    }
  ]
}

RemoveUnused {
  imports = true
}

